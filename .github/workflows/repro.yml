name: repro

# workflow-version: 2
on:
  workflow_dispatch:

permissions: {}

jobs:
  tag-head:
    name: tag HEAD
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Show refs
        run: |
          git log --oneline -2
          echo "HEAD=$(git rev-parse HEAD)"
          echo "HEAD^=$(git rev-parse HEAD^)"

      - name: Create and push tag to HEAD
        run: |
          tag="control-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git tag "$tag" HEAD
          git push origin "$tag"

  tag-parent:
    name: tag HEAD^
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Show workflow diff
        run: |
          git log --oneline -2
          echo "HEAD=$(git rev-parse HEAD)"
          echo "HEAD^=$(git rev-parse HEAD^)"
          echo
          echo "Workflow diff between HEAD^ and HEAD:"
          git diff --stat HEAD^ HEAD -- .github/workflows || true
          echo
          git diff HEAD^ HEAD -- .github/workflows || true

      - name: Create and push tag to HEAD^
        run: |
          tag="parent-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git tag "$tag" HEAD^
          git push origin "$tag"
